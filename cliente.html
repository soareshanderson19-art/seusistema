<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicite seu Projeto - Seu Sistema</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome para Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #090d16;
            --bg-card: rgba(17, 24, 39, 0.7);
            --border-color: rgba(139, 92, 246, 0.25);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary-color: #8b5cf6; 
            --accent-color: #3b82f6;  
            --primary-gradient: linear-gradient(135deg, var(--primary-color) 0%, var(--accent-color) 100%);
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            background-image: radial-gradient(circle at top right, rgba(139, 92, 246, 0.08), transparent 45%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            gap: 40px;
        }

        h1, h2, h3, h4, h5, h6, p, span, div, label, input, select, textarea {
            word-break: break-word;
            overflow-wrap: break-word;
        }

        /* Animação de Abertura */
        .intro-loader {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-main);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out;
        }

        .intro-loader.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .intro-logo-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--bg-main);
            border: 3px solid var(--primary-color);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulseGlow 2s infinite ease-in-out;
            margin-bottom: 24px;
        }

        .intro-logo-circle i {
            color: #ffffff;
            font-size: 2rem;
            font-weight: bold;
        }

        .intro-welcome-text {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInUp 1.2s forwards 0.4s ease-out;
        }

        .intro-welcome-text span {
            display: block;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* Container do Formulário */
        .form-container {
            width: 100%;
            max-width: 600px;
            background-color: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(139, 92, 246, 0.05);
            animation: formReveal 1s ease-out;
            display: none; 
        }

        .form-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .form-header h2 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.025em;
        }

        .form-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 6px;
        }

        /* Grid do Formulário */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .col-span-2 {
            grid-column: span 2;
        }

        label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select, textarea {
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background-color: rgba(9, 13, 22, 0.5);
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
            width: 100%;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
            background-color: rgba(9, 13, 22, 0.8);
        }

        textarea {
            resize: none;
        }

        /* Opções de Seleção de Tipo */
        .radio-group-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 6px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: rgba(9, 13, 22, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .radio-option:hover {
            border-color: rgba(139, 92, 246, 0.3);
            background-color: rgba(9, 13, 22, 0.6);
        }

        .radio-option input[type="radio"] {
            accent-color: var(--primary-color);
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .radio-label-text {
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Botões */
        .btn {
            padding: 14px 28px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        .btn-primary:hover {
            opacity: 0.95;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }

        /* Tela de Sucesso */
        .success-state {
            text-align: center;
            display: none;
            animation: fadeIn 0.8s ease-in-out;
        }

        .success-icon {
            font-size: 4rem;
            color: var(--success);
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .success-state h3 {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .success-state p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Animações */
        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(139, 92, 246, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 35px rgba(139, 92, 246, 0.7); }
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes formReveal {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Responsividade */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .form-container {
                padding: 24px;
                border-radius: 16px;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .col-span-2 {
                grid-column: span 1;
            }

            .intro-welcome-text {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

    <!-- Intro Animada de Boas-vindas -->
    <div class="intro-loader" id="introLoader">
        <div class="intro-logo-circle">
            <i class="fa-solid fa-code"></i>
        </div>
        <h1 class="intro-welcome-text">
            Bem-vindo ao Seu Sistema
            <span>Inovação & Tecnologia</span>
        </h1>
    </div>

    <!-- Container Central do Formulário -->
    <div class="form-container" id="formContainer">
        
        <!-- Formulário Ativo -->
        <form id="form-solicitacao-externa">
            <div class="form-header">
                <h2>Solicite seu Projeto Técnico</h2>
                <p>Preencha os detalhes abaixo para estruturarmos seu escopo comercial.</p>
            </div>

            <div class="form-grid">
                <!-- Nome (OBRIGATÓRIO) -->
                <div class="form-group col-span-2">
                    <label for="cli-nome">Seu Nome / Razão Social (Obrigatório)</label>
                    <input type="text" id="cli-nome" required placeholder="Digite seu nome completo ou empresa">
                </div>

                <!-- E-mail (OPCIONAL) -->
                <div class="form-group">
                    <label for="cli-email">E-mail de Contato (Opcional)</label>
                    <input type="email" id="cli-email" placeholder="contato@empresa.com">
                </div>

                <!-- Telefone / WhatsApp (OBRIGATÓRIO) -->
                <div class="form-group">
                    <label for="cli-tel">Telefone / WhatsApp (Obrigatório)</label>
                    <input type="text" id="cli-tel" required placeholder="(00) 00000-0000">
                </div>

                <!-- Tipo de Negócio (OPCIONAL) -->
                <div class="form-group col-span-2">
                    <label for="cli-negocio">Qual é o seu Tipo de Negócio? (Opcional)</label>
                    <input type="text" id="cli-negocio" placeholder="Ex: Prestador de Serviços, Loja de Roupas, Startup, etc.">
                </div>

                <!-- Valor de Investimento Comercial -->
                <div class="form-group col-span-2">
                    <label for="cli-orcamento">Quanto possui disponível para investir no seu sistema/site? (Obrigatório)</label>
                    <input type="text" id="cli-orcamento" required placeholder="Ex: R$ 2.500, R$ 10.000 ou A combinar">
                </div>

                <!-- Tipo de Projeto Necessário -->
                <div class="form-group col-span-2">
                    <label>Tipo de Projeto Necessário</label>
                    <div class="radio-group-container">
                        <label class="radio-option">
                            <input type="radio" name="cli-sistema-tipo" value="Apenas um sistema interno" checked>
                            <span class="radio-label-text">Apenas um sistema interno (Painel administrativo, ERP, CRM)</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="cli-sistema-tipo" value="Sistema interno e página cliente">
                            <span class="radio-label-text">Sistema interno integrado + Página pública do cliente</span>
                        </label>
                    </div>
                </div>

                <!-- Descrição Breve (OPCIONAL) -->
                <div class="form-group col-span-2">
                    <label for="cli-desc">Descreva brevemente o que você gostaria que o sistema/site fizesse (Opcional)</label>
                    <textarea id="cli-desc" rows="4" placeholder="Fale brevemente sobre o seu modelo de negócio e quais funcionalidades você precisa para o seu dia a dia técnico..."></textarea>
                </div>

                <!-- Botão de Envio -->
                <div class="form-group col-span-2 margin-top">
                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-paper-plane"></i> Enviar Solicitação Técnica</button>
                </div>
            </div>
        </form>

        <!-- Sucesso de Envio -->
        <div class="success-state" id="successState">
            <div class="success-icon"><i class="fa-solid fa-circle-check"></i></div>
            <h3>Solicitação Enviada!</h3>
            <p>Os seus dados técnicos foram cadastrados com sucesso.</p>
            <p style="margin-top: 10px;">Redirecionando você para o nosso WhatsApp em instantes...</p>
        </div>

    </div>

    <!-- Conectores do Firebase integrados via Módulo -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Credenciais do Banco
        const firebaseConfig = {
          apiKey: "AIzaSyCk1gRMnnNhHZFIPJKRwDzFFcPL_aYWl78",
          authDomain: "seusitematech.firebaseapp.com",
          projectId: "seusitematech",
          storageBucket: "seusitematech.firebasestorage.app",
          messagingSenderId: "533715411921",
          appId: "1:533715411921:web:6f68032e9f54b037a2b6f0",
          measurementId: "G-4KSGD4M3W0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colSolicitacoes = collection(db, "solicitacoes");

        // Gerenciamento da Animação de Entrada
        document.addEventListener('DOMContentLoaded', () => {
            const loader = document.getElementById('introLoader');
            const formContainer = document.getElementById('formContainer');

            setTimeout(() => {
                loader.classList.add('fade-out');
                formContainer.style.display = 'block';
            }, 3200);
        });

        // Envio do Formulário para o Firestore e Redirecionamento de WhatsApp
        document.getElementById('form-solicitacao-externa').addEventListener('submit', async (e) => {
            e.preventDefault();

            const nome = document.getElementById('cli-nome').value.trim();
            const email = document.getElementById('cli-email').value.trim() || 'Não informado';
            const telefone = document.getElementById('cli-tel').value.trim();
            const negocio = document.getElementById('cli-negocio').value.trim() || 'Não informado';
            const orcamentoDisponivel = document.getElementById('cli-orcamento').value.trim();
            const tipoSistema = document.querySelector('input[name="cli-sistema-tipo"]:checked').value;
            const descricao = document.getElementById('cli-desc').value.trim() || 'Sem especificações adicionais';

            const escopoCompilado = `[Negócio: ${negocio}] - [Tipo de Sistema: ${tipoSistema}] - [Verba Disponível: ${orcamentoDisponivel}] - Detalhes: ${descricao}`;

            try {
                const snapshot = await getDocs(colSolicitacoes);
                const numSeq = String(snapshot.size + 1).padStart(2, '0');

                // 1. Salva no banco Firebase Firestore
                await addDoc(colSolicitacoes, {
                    clienteNome: nome,
                    clienteEmail: email,
                    clienteTelefone: telefone,
                    descricaoServico: escopoCompilado,
                    status: 'Pendente',
                    dataEnvio: new Date().toISOString()
                });

                // 2. Exibe tela de sucesso
                document.getElementById('form-solicitacao-externa').style.display = 'none';
                document.getElementById('successState').style.display = 'block';

                // 3. Monta texto estruturado para envio de mensagem no WhatsApp do administrador
                const msgWpp = `*SOLICITAÇÃO EXTERNA #${numSeq}* 🚀

*Nome do Cliente:* ${nome}
*E-mail:* ${email}
*Telefone/WhatsApp:* ${telefone}
*Tipo de Negócio:* ${negocio}
*Tipo de Projeto:* ${tipoSistema}
*Investimento Disponível:* ${orcamentoDisponivel}

*Escopo Técnico:* 
_${descricao}_`;

                // 4. Redireciona de forma contínua para o seu número de suporte
                setTimeout(() => {
                    window.location.href = `https://api.whatsapp.com/send?phone=5551986485243&text=${encodeURIComponent(msgWpp)}`;
                }, 2000); 

            } catch (error) {
                console.error("Erro técnico ao salvar dados: ", error);
                alert("Ocorreu uma inconsistência ao processar sua requisição. Verifique sua conexão e tente novamente.");
            }
        });
    </script>
</body>
</html>
